<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>admin</title>
    <style>
        /* Color Harmonized Admin Panel Container */
        .glass-view-pane {
            /* Uses the identical premium deep midnight navy base from your top bar with smooth transparency */
            background: rgba(2, 14, 46, 0.82);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);

            /* Subtle border matching the golden sidebar accents */
            border: 1px solid rgba(255, 204, 0, 0.15);
            border-radius: 1.25rem;
            padding: 3rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
            max-width: 850px;

            margin: 2rem auto;
            margin-top: -12px;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .panel-header-block {
            margin-bottom: 2.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 1.5rem;
        }

        .panel-title-text {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .panel-subtitle-text {
            color: #94a3b8;
            /* Crisp readability for descriptions */
            font-size: 1rem;
            margin-top: 0.5rem;
            font-weight: 400;
        }

        /* Form Layout Grid */
        .cyber-form-layout {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .form-row-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2.5rem;
        }

        @media (max-width: 680px) {
            .form-row-grid {
                grid-template-columns: 1fr;
                gap: 1.75rem;
            }
        }

        /* Input Fields & Typography Coordinating with Sidebar Yellow */
        .input-group-context {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
        }

        .cyber-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: #f5c340;
            /* Coordinates perfectly with the sidebar golden-yellow shade */
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .cyber-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .cyber-input-icon {
            position: absolute;
            left: 1.25rem;
            pointer-events: none;
            font-size: 1.2rem;
        }

        .cyber-input-control {
            width: 100%;
            padding: 1.1rem 1.25rem 1.1rem 3.2rem;
            /* Inner boxes are a deeply saturated variation of the header menu hue */
            background: rgba(1, 7, 26, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 0.75rem;
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 500;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cyber-input-control::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        /* Interactive Focus States */
        .cyber-input-control:focus {
            outline: none;
            border-color: #f5c340;
            background: rgba(1, 7, 26, 0.85);
            box-shadow: 0 0 0 4px rgba(245, 195, 64, 0.2);
        }

        /* Dropdown styling */
        .dropdown-select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23f5c340' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1.25rem center;
            background-size: 1.2rem;
            padding-right: 3rem;
        }

        .dropdown-select option {
            background-color: #020e2e;
            /* Matches the top bar hue */
            color: #ffffff;
            padding: 1rem;
        }

        /* Matching Action Button */
        .action-footer-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-top: 1rem;
        }

        .btn-cyber-submit {
            padding: 1.1rem 2.5rem;
            background: #f5c340;
            /* Golden yellow matching your primary layout tone */
            color: #020e2e;
            /* Top bar blue text color for excellent readability contrast */
            font-weight: 750;
            font-size: 1.05rem;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.65rem;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(245, 195, 64, 0.25);
        }

        .btn-cyber-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(245, 195, 64, 0.45);
        }

        .btn-cyber-submit:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <!-- ADMIN WORKSPACE: ADD NEW COURSE COMPONENT -->
    <div id="add-course-panel" class="glass-view-pane hidden-view">
        <div class="panel-header-block">
            <h2 class="panel-title-text">✨ Academic Registrar Workspace</h2>
            <p class="panel-subtitle-text">Provision and deploy fresh curriculum modules into the institutional student
                ecosystem.</p>
        </div>

        <form id="admin-course-form" onsubmit="handleCourseProvisioning(event)" class="cyber-form-layout">
            <!-- Two Column Row for Course Identifiers -->
            <div class="form-row-grid">
                <div class="input-group-context">
                    <label for="course-code-input" class="cyber-label">Course Code</label>
                    <div class="cyber-input-wrapper">
                        <span class="cyber-input-icon">🆔</span>
                        <input type="text" id="course-code-input" class="cyber-input-control"
                            placeholder="e.g., COM 211" required>
                    </div>
                </div>

                <div class="input-group-context">
                    <label for="course-name-input" class="cyber-label">Course Title Name</label>
                    <div class="cyber-input-wrapper">
                        <span class="cyber-input-icon">📖</span>
                        <input type="text" id="course-name-input" class="cyber-input-control"
                            placeholder="e.g., Systems Architecture" required>
                    </div>
                </div>
            </div>

            <!-- Two Column Row for Personnel & Academic Year -->
            <div class="form-row-grid">
                <div class="input-group-context">
                    <label for="course-lecturer-input" class="cyber-label">Assigned Lecturer</label>
                    <div class="cyber-input-wrapper">
                        <span class="cyber-input-icon">👨‍🏫</span>
                        <input type="text" id="course-lecturer-input" class="cyber-input-control"
                            placeholder="e.g., Dr. J. Odhiambo" required>
                    </div>
                </div>

                <div class="input-group-context">
                    <label for="course-year-input" class="cyber-label">Target Academic Year</label>
                    <div class="cyber-input-wrapper">
                        <span class="cyber-input-icon">📅</span>
                        <select id="course-year-input" class="cyber-input-control dropdown-select" required>
                            <option value="" disabled selected hidden>Select academic year level...</option>
                            <option value="Year 1">Year 1 (Freshman Modules)</option>
                            <option value="Year 2">Year 2 (Intermediate Core)</option>
                            <option value="Year 3">Year 3 (Advanced Specialization)</option>
                            <option value="Year 4">Year 4 (Senior Project Tracks)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Form Submission Button -->
            <div class="action-footer-wrapper">
                <button type="submit" class="btn-cyber-submit">
                    <span class="btn-icon-flash">⚡</span> Deploy Module to Portal
                </button>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="superbaseConfig.js"></script>
    <script>
        // Append into your dashboard.js file

        async function handleCourseProvisioning(event) {
            event.preventDefault();

            // 1. Collect form entries from values
            const courseCode = document.getElementById('course-code-input').value.trim();
            const courseName = document.getElementById('course-name-input').value.trim();
            const lecturer = document.getElementById('course-lecturer-input').value.trim();
            const yearTaught = document.getElementById('course-year-input').value;

            try {
                // 2. Perform Insert transaction to Supabase using the authenticated client global reference instance
                const { data, error } = await _supabase
                    .from('courses')
                    .insert([
                        {
                            course_code: courseCode,
                            course_name: courseName,
                            lecturer: lecturer,
                            year_taught: yearTaught
                        }
                    ]);

                if (error) throw error;

                // 3. Status Notification Feedback Alert Success Loop 
                alert(`🚀 Complete: "${courseCode} - ${courseName}" is successfully registered to the portal!`);

                // Clear layout state input fields cleanly
                document.getElementById('admin-course-form').reset();

            } catch (error) {
                console.error("Database Write Fail Context:", error);
                alert(`❌ Database Insertion Blocked: ${error.message}`);
            }
        }
    </script>

</body>

</html>
